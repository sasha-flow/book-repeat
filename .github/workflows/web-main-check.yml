name: Web Main Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: web-main-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  NEXT_PUBLIC_SUPABASE_URL: ${{ format('https://{0}.supabase.co', vars.SUPABASE_PROJECT_ID) }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  check-web:
    name: Lint and build apps/web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint apps/web
        run: pnpm --filter web lint

      - name: Build apps/web
        run: pnpm --filter web build