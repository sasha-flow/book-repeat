name: Supabase Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: supabase-production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  validate-migrations:
    name: Validate production migrations
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" -p "$SUPABASE_DB_PASSWORD"

      - name: Dry-run tracked migrations
        run: supabase db push --linked --dry-run -p "$SUPABASE_DB_PASSWORD"

  deploy-migrations:
    name: Push production migrations
    runs-on: ubuntu-latest
    needs: validate-migrations
    if: github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" -p "$SUPABASE_DB_PASSWORD"

      - name: Push tracked migrations
        run: supabase db push --linked -p "$SUPABASE_DB_PASSWORD"