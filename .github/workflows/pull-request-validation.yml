name: Pull Request Validation

"on":
  pull_request: {}

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Type Check, Build, and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
      SUPABASE_SERVICE_ROLE_KEY: sb_secret_ci_placeholder
      SUPABASE_IMPORT_BUCKET: imports
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type checks
        run: pnpm check-types

      - name: Run build
        run: pnpm build

      - name: Setup Supabase CLI
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != '' && env.SUPABASE_PROJECT_ID != '' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase migration dry-run
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != '' && env.SUPABASE_PROJECT_ID != '' }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push --dry-run

      - name: Run tests when present
        run: pnpm -r --if-present test
